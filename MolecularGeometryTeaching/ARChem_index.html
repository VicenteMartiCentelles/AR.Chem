<!DOCTYPE html>
<html>
  <head>
    <title>AR.Chem - Geometría Molecular</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script async src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r120/examples/js/loaders/VRMLLoader.js"></script>
    
    <style>
      #ui-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; z-index: 1000; display: none; text-align: center; }
      #info-panel { background: rgba(255, 255, 255, 0.95); color: #333; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: none; font-family: sans-serif; border: 2px solid #2196F3; }
      #reveal-btn { background: #2196F3; color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; outline: none; }
      .mol-title { color: #1976D2; font-size: 1.3em; display: block; margin-bottom: 5px; font-weight: bold; }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <div id="ui-container">
      <div id="info-panel">
        <span id="mol-name" class="mol-title"></span>
        <div id="mol-details"></div>
      </div>
      <button id="reveal-btn">🔍 VER GEOMETRÍA</button>
    </div>

    <a-scene 
      embedded 
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">

      <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="1 1 1"></a-entity>

      <a-marker type="pattern" url="pattern-h2o.patt" id="h2o">
        <a-entity id="model-h2o" rotation="-90 0 0"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-ch4.patt" id="ch4">
        <a-entity id="model-ch4" rotation="-90 0 0"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-sf6.patt" id="sf6">
        <a-entity id="model-sf6" rotation="-90 0 0"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-bf3.patt" id="bf3">
        <a-entity id="model-bf3" rotation="-90 0 0"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-nh3.patt" id="nh3">
        <a-entity id="model-nh3" rotation="-90 0 0"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-pf5.patt" id="pf5">
        <a-entity id="model-pf5" rotation="-90 0 0"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-xef4.patt" id="xef4">
        <a-entity id="model-xef4" rotation="-90 0 0"></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const molData = {
        'h2o': { n: 'Agua (H₂O)', d: 'Geometría: <b>Angular</b><br>Ángulo: ~104.5°<br>Hibridación: sp³' },
        'ch4': { n: 'Metano (CH₄)', d: 'Geometría: <b>Tetraédrica</b><br>Ángulo: 109.5°<br>Hibridación: sp³' },
        'sf6': { n: 'Hexafluoruro (SF₆)', d: 'Geometría: <b>Octaédrica</b><br>Ángulo: 90°<br>Hibridación: sp³d²' },
        'bf3': { n: 'Trifluoruro de Boro (BF₃)', d: 'Geometría: <b>Trigonal Plana</b><br>Ángulo: 120°<br>Hibridación: sp²' },
        'nh3': { n: 'Amoníaco (NH₃)', d: 'Geometría: <b>Piramidal Trigonal</b><br>Ángulo: ~107°<br>Hibridación: sp³' },
        'pf5': { n: 'Pentafluoruro (PF₅)', d: 'Geometría: <b>Bipirámide Trigonal</b><br>Ángulo: 90° y 120°<br>Hibridación: sp³d' },
        'xef4': { n: 'Tetrafluoruro de Xenón (XeF₄)', d: 'Geometría: <b>Cuadrada Plana</b><br>Ángulo: 90°<br>Hibridación: sp³d²' }
      };

      function initModels() {
        if (typeof THREE.VRMLLoader === 'undefined') {
          setTimeout(initModels, 500);
          return;
        }

        const loader = new THREE.VRMLLoader();
        
        Object.keys(molData).forEach(id => {
          loader.load(`${id}.wrl`, (vrml) => {
            const el = document.getElementById(`model-${id}`);
            if (el) {
              // Ajuste de escala basado en tu archivo de agua (esferas de 0.4 unidades)
              vrml.scale.set(10, 10, 10); 
              
              // Centrado Radical: Compensa las coordenadas de traslación de PyMOL
              const box = new THREE.Box3().setFromObject(vrml);
              const center = box.getCenter(new THREE.Vector3());
              vrml.position.x = -center.x;
              vrml.position.y = -center.y;
              vrml.position.z = -center.z;

              vrml.traverse(node => {
                if (node.isMesh) {
                  node.material.side = THREE.DoubleSide;
                  node.material.transparent = false;
                  node.material.opacity = 1.0;
                }
              });

              el.setObject3D('mesh', vrml);
              console.log("Molecula cargada y centrada: " + id);
            }
          }, undefined, (err) => console.error("Error en " + id, err));
        });
      }

      // Esperar a que la cámara inicie antes de cargar modelos
      window.addEventListener('load', () => setTimeout(initModels, 2000));

      // Lógica de UI
      const uiContainer = document.getElementById('ui-container');
      const infoPanel = document.getElementById('info-panel');
      const revealBtn = document.getElementById('reveal-btn');
      const molName = document.getElementById('mol-name');
      const molDetails = document.getElementById('mol-details');

      document.querySelectorAll('a-marker').forEach(marker => {
        marker.addEventListener('markerFound', () => {
          const data = molData[marker.id];
          if (data) {
            molName.innerText = data.n;
            molDetails.innerHTML = data.d;
            uiContainer.style.display = 'block';
            infoPanel.style.display = 'none';
            revealBtn.innerText = "🔍 VER GEOMETRÍA";
          }
        });
        marker.addEventListener('markerLost', () => {
          uiContainer.style.display = 'none';
        });
      });

      revealBtn.addEventListener('click', () => {
        if (infoPanel.style.display === 'none') {
          infoPanel.style.display = 'block';
          revealBtn.innerText = "❌ OCULTAR INFO";
        } else {
          infoPanel.style.display = 'none';
          revealBtn.innerText = "🔍 VER GEOMETRÍA";
        }
      });
    </script>
  </body>
</html>
