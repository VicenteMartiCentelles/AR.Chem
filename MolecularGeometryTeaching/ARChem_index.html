<!DOCTYPE html>
<html>
  <head>
    <title>AR.Chem</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script async src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r120/examples/js/loaders/VRMLLoader.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      vr-mode-ui="enabled: false">

      <a-marker type="pattern" url="pattern-h2o.patt" id="h2o">
        <a-box position="0 0.5 0" material="opacity: 0.5; color: red;"></a-box>
        
        <a-entity id="mol-h2o" rotation="-90 0 0"></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Lógica de carga manual para que no rompa la cámara al inicio
      window.addEventListener('load', () => {
        setTimeout(() => {
          if (typeof THREE.VRMLLoader !== 'undefined') {
            const loader = new THREE.VRMLLoader();
            loader.load('h2o.wrl', (vrml) => {
              vrml.scale.set(2, 2, 2);
              document.getElementById('mol-h2o').setObject3D('mesh', vrml);
              console.log("VRML cargado manualmente");
            });
          }
        }, 3000); // Esperamos 3 segundos con la cámara ya encendida
      });
    </script>
  </body>
</html>
