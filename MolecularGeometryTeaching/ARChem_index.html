<!DOCTYPE html>
<html>
  <head>
    <title>AR.Chem - Diagnóstico Final</title>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r120/examples/js/loaders/VRMLLoader.js"></script>
    
    <style>
      #debug-log { position: fixed; top: 10px; left: 10px; width: 90%; background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; z-index: 2000; height: 120px; overflow-y: auto; border: 2px solid #0f0; }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <div id="debug-log">Iniciando diagnóstico...<br></div>

    <script>
      const logger = document.getElementById('debug-log');
      function log(msg) {
        logger.innerHTML += "> " + msg + "<br>";
        logger.scrollTop = logger.scrollHeight;
      }

      // Verificamos si los archivos existen antes de cargarlos
      async function checkFile(url) {
        try {
          const response = await fetch(url, { method: 'HEAD' });
          if (response.ok) log("✅ Archivo encontrado en servidor: " + url.split('/').pop());
          else log("❌ Error 404: No existe " + url.split('/').pop());
        } catch (e) {
          log("❌ Error de red al buscar " + url.split('/').pop());
        }
      }

      AFRAME.registerComponent('vrml-loader', {
        schema: { type: 'string' },
        init: function () {
          const el = this.el;
          const fileName = this.data;
          // Forzamos la ruta absoluta
          const url = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) + '/' + fileName;
          
          checkFile(url);

          const loader = new THREE.VRMLLoader();
          log("Solicitando " + fileName + "...");
          
          loader.load(url, 
            (vrml) => {
              log("💎 OBJETO RENDERIZADO: " + fileName);
              vrml.scale.set(2, 2, 2); 
              el.setObject3D('mesh', vrml);
            },
            (xhr) => { log(fileName + ": " + Math.round((xhr.loaded/xhr.total)*100) + "%"); },
            (err) => { log("❌ FALLO CARGA: " + fileName); }
          );
        }
      });
    </script>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-marker type="pattern" url="pattern-h2o.patt" id="h2o">
        <a-entity vrml-loader="h2o.wrl"></a-entity>
      </a-marker>
      <a-marker type="pattern" url="pattern-ch4.patt" id="ch4">
        <a-entity vrml-loader="ch4.wrl"></a-entity>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
