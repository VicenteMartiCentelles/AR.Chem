<!DOCTYPE html>
<html>
  <head>
    <title>AR.Chem - Debug H2O</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r120/examples/js/loaders/VRMLLoader.js"></script>
    <style>
      #ui-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; z-index: 1000; display: none; text-align: center; }
      #info-panel { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; font-family: sans-serif; border: 2px solid #2196F3; }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <div id="ui-container">
      <div id="info-panel">
        <span id="mol-name" style="font-weight:bold; color:#1976D2; font-size:1.2em;">Agua (H₂O)</span>
        <div id="mol-details">Estado: Buscando archivo...</div>
      </div>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-marker type="pattern" url="pattern-h2o.patt" id="h2o">
        <a-box id="debug-cube" position="0 0 0" scale="0.15 0.15 0.15" material="color: red; opacity: 0.8"></a-box>
        <a-entity id="model-h2o" rotation="-90 0 0"></a-entity>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = new THREE.VRMLLoader();
          // TRUCO DE SEGURIDAD: Permitir carga desde GitHub
          loader.setCrossOrigin('anonymous');
          
          const details = document.getElementById('mol-details');
          const cube = document.getElementById('debug-cube');

          console.log("Iniciando descarga de h2o.txt...");
          
          loader.load('h2o.txt', (vrml) => {
            const el = document.getElementById('model-h2o');
            
            // Escala masiva para archivos de PyMOL
            vrml.scale.set(100, 100, 100); 
            
            // Centrar modelo
            const box = new THREE.Box3().setFromObject(vrml);
            const center = box.getCenter(new THREE.Vector3());
            vrml.position.set(-center.x, -center.y, -center.z);

            el.setObject3D('mesh', vrml);
            
            // ÉXITO
            cube.setAttribute('visible', 'false');
            details.innerHTML = "¡MOLÉCULA CARGADA!";
            console.log("Carga completada con éxito");
          }, 
          undefined, 
          (err) => {
            console.error(err);
            // Si el cubo se pone amarillo, es que el archivo h2o.txt no existe en el servidor
            cube.setAttribute('material', 'color: yellow');
            details.innerHTML = "<span style='color:orange'>Error: Archivo h2o.txt no accesible</span>";
          });
        }, 3000);
      });

      // Lógica de visibilidad
      document.querySelector('a-marker').addEventListener('markerFound', () => {
        document.getElementById('ui-container').style.display = 'block';
      });
    </script>
  </body>
</html>
