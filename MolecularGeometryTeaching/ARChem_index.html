<!DOCTYPE html>
<html>
  <head>
    <title>AR.Chem - Laboratorio VSEPR Final</title>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #ui-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; display: none; text-align: center; width: 280px; }
      #info-panel { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; font-family: sans-serif; border: 2px solid #2196F3; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
      #reveal-btn { background: #2196F3; color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
      .mol-title { color: #1976D2; font-weight: bold; font-size: 1.2em; margin-bottom: 5px; }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <div id="ui-container">
      <div id="info-panel">
        <div id="mol-name" class="mol-title"></div>
        <div id="mol-details"></div>
      </div>
      <button id="reveal-btn">🔍 VER INFORMACIÓN</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="1 2 1"></a-entity>

      <a-marker type="pattern" url="pattern-h2o.patt" id="marker-h2o">
        <a-entity position="0 0.5 0" scale="0.4 0.4 0.4">
          <a-sphere color="#FF0000" radius="0.4"></a-sphere>
          <a-sphere position="0.6 0.5 0" radius="0.2"></a-sphere>
          <a-sphere position="-0.6 0.5 0" radius="0.2"></a-sphere>
          <a-cylinder position="0.3 0.25 0" rotation="0 0 -50" radius="0.05" height="0.8" color="#999"></a-cylinder>
          <a-cylinder position="-0.3 0.25 0" rotation="0 0 50" radius="0.05" height="0.8" color="#999"></a-cylinder>
        </a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-ch4.patt" id="marker-ch4">
        <a-entity position="0 0.5 0" scale="0.4 0.4 0.4">
          <a-sphere color="#333" radius="0.4"></a-sphere>
          <a-sphere position="0 0.8 0" radius="0.2"></a-sphere>
          <a-sphere position="0.75 -0.3 0.4" radius="0.2"></a-sphere>
          <a-sphere position="-0.75 -0.3 0.4" radius="0.2"></a-sphere>
          <a-sphere position="0 -0.3 -0.8" radius="0.2"></a-sphere>
          <a-cylinder position="0 0.4 0" radius="0.05" height="0.8" color="#999"></a-cylinder>
          <a-cylinder position="0.37 -0.15 0.2" rotation="60 -45 0" radius="0.05" height="0.8" color="#999"></a-cylinder>
          <a-cylinder position="-0.37 -0.15 0.2" rotation="60 45 0" radius="0.05" height="0.8" color="#999"></a-cylinder>
          <a-cylinder position="0 -0.15 -0.4" rotation="60 0 0" radius="0.05" height="0.8" color="#999"></a-cylinder>
        </a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-nh3.patt" id="marker-nh3">
        <a-entity position="0 0.5 0" scale="0.4 0.4 0.4">
          <a-sphere color="#2196F3" radius="0.4"></a-sphere>
          <a-sphere position="0.7 -0.4 0.4" radius="0.2"></a-sphere>
          <a-sphere position="-0.7 -0.4 0.4" radius="0.2"></a-sphere>
          <a-sphere position="0 -0.4 -0.8" radius="0.2"></a-sphere>
          <a-cylinder position="0.35 -0.2 0.2" rotation="60 -45 0" radius="0.05" height="0.8" color="#999"></a-cylinder>
          <a-cylinder position="-0.35 -0.2 0.2" rotation="60 45 0" radius="0.05" height="0.8" color="#999"></a-cylinder>
          <a-cylinder position="0 -0.2 -0.4" rotation="60 0 0" radius="0.05" height="0.8" color="#999"></a-cylinder>
        </a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-bf3.patt" id="marker-bf3">
        <a-entity position="0 0.5 0" scale="0.4 0.4 0.4">
          <a-sphere color="#FFB74D" radius="0.35"></a-sphere>
          <a-sphere position="0 0.9 0" radius="0.25" color="#4CAF50"></a-sphere>
          <a-sphere position="0.78 -0.45 0" radius="0.25" color="#4CAF50"></a-sphere>
          <a-sphere position="-0.78 -0.45 0" radius="0.25" color="#4CAF50"></a-sphere>
          <a-cylinder position="0 0.45 0" radius="0.05" height="0.9" color="#999"></a-cylinder>
          <a-cylinder position="0.39 -0.22 0" rotation="0 0 -60" radius="0.05" height="0.9" color="#999"></a-cylinder>
          <a-cylinder position="-0.39 -0.22 0" rotation="0 0 60" radius="0.05" height="0.9" color="#999"></a-cylinder>
        </a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-pf5.patt" id="marker-pf5">
        <a-entity position="0 0.5 0" scale="0.4 0.4 0.4">
          <a-sphere color="#FF9800" radius="0.35"></a-sphere>
          <a-sphere position="0 1 0" radius="0.25" color="#4CAF50"></a-sphere>
          <a-sphere position="0 -1 0" radius="0.25" color="#4CAF50"></a-sphere>
          <a-cylinder position="0 0 0" radius="0.05" height="2" color="#999"></a-cylinder>
          <a-sphere position="0.9 0 0" radius="0.25" color="#4CAF50"></a-sphere>
          <a-sphere position="-0.45 0 0.78" radius="0.25" color="#4CAF50"></a-sphere>
          <a-sphere position="-0.45 0 -0.78" radius="0.25" color="#4CAF50"></a-sphere>
          <a-cylinder position="0.45 0 0" rotation="0 0 90" radius="0.05" height="0.9" color="#999"></a-cylinder>
          <a-cylinder position="-0.22 0 0.39" rotation="0 120 90" radius="0.05" height="0.9" color="#999"></a-cylinder>
          <a-cylinder position="-0.22 0 -0.39" rotation="0 240 90" radius="0.05" height="0.9" color="#999"></a-cylinder>
        </a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-sf6.patt" id="marker-sf6">
        <a-entity position="0 0.5 0" scale="0.35 0.35 0.35">
          <a-sphere color="#FFEB3B" radius="0.4"></a-sphere>
          <a-sphere position="0 1 0" radius="0.25" color="#4CAF50"></a-sphere>
          <a-sphere position="0 -1 0" radius="0.25" color="#4CAF50"></a-sphere>
          <a-sphere position="1 0 0" radius="0.25" color="#4CAF50"></a-sphere>
          <a-sphere position="-1 0 0" radius="0.25" color="#4CAF50"></a-sphere>
          <a-sphere position="0 0 1" radius="0.25" color="#4CAF50"></a-sphere>
          <a-sphere position="0 0 -1" radius="0.25" color="#4CAF50"></a-sphere>
          <a-cylinder position="0 0 0" radius="0.05" height="2" color="#999"></a-cylinder>
          <a-cylinder position="0 0 0" rotation="0 0 90" radius="0.05" height="2" color="#999"></a-cylinder>
          <a-cylinder position="0 0 0" rotation="90 0 0" radius="0.05" height="2" color="#999"></a-cylinder>
        </a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-xef4.patt" id="marker-xef4">
        <a-entity position="0 0.5 0" scale="0.4 0.4 0.4">
          <a-sphere color="#9C27B0" radius="0.4"></a-sphere>
          <a-sphere position="1 0 0" radius="0.25" color="#4CAF50"></a-sphere>
          <a-sphere position="-1 0 0" radius="0.25" color="#4CAF50"></a-sphere>
          <a-sphere position="0 0 1" radius="0.25" color="#4CAF50"></a-sphere>
          <a-sphere position="0 0 -1" radius="0.25" color="#4CAF50"></a-sphere>
          <a-cylinder position="0 0 0" rotation="0 0 90" radius="0.05" height="2" color="#999"></a-cylinder>
          <a-cylinder position="0 0 0" rotation="90 0 0" radius="0.05" height="2" color="#999"></a-cylinder>
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const data = {
        'marker-h2o': { n: 'Agua (H₂O)', d: 'Geometría: <b>Angular</b><br>Hibridación: <b>sp³</b>' },
        'marker-ch4': { n: 'Metano (CH₄)', d: 'Geometría: <b>Tetraédrica</b><br>Hibridación: <b>sp³</b>' },
        'marker-nh3': { n: 'Amoníaco (NH₃)', d: 'Geometría: <b>Piramidal Trigonal</b><br>Hibridación: <b>sp³</b>' },
        'marker-bf3': { n: 'Trifluoruro de Boro (BF₃)', d: 'Geometría: <b>Trigonal Plana</b><br>Hibridación: <b>sp²</b>' },
        'marker-pf5': { n: 'Pentafluoruro (PF₅)', d: 'Geometría: <b>Bipirámide Trigonal</b><br>Hibridación: <b>sp³d</b>' },
        'marker-sf6': { n: 'Hexafluoruro (SF₆)', d: 'Geometría: <b>Octaédrica</b><br>Hibridación: <b>sp³d²</b>' },
        'marker-xef4': { n: 'XeF₄', d: 'Geometría: <b>Cuadrada Plana</b><br>Hibridación: <b>sp³d²</b>' }
      };

      const ui = document.getElementById('ui-container');
      const panel = document.getElementById('info-panel');
      const mName = document.getElementById('mol-name');
      const mDetails = document.getElementById('mol-details');
      const btn = document.getElementById('reveal-btn');

      document.querySelectorAll('a-marker').forEach(m => {
        m.addEventListener('markerFound', () => {
          mName.innerText = data[m.id].n;
          mDetails.innerHTML = data[m.id].d;
          ui.style.display = 'block';
          panel.style.display = 'none'; // Reseteamos panel al cambiar marcador
        });
        m.addEventListener('markerLost', () => { ui.style.display = 'none'; });
      });

      btn.addEventListener('click', () => {
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      });
    </script>
  </body>
</html>
