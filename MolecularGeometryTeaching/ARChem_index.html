<!DOCTYPE html>
<html>
  <head>
    <title>AR.Chem - Localización de Molécula</title>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <div id="status" style="position: fixed; top: 10px; left: 10px; z-index: 1000; background: white; padding: 10px; font-family: sans-serif;">
      Estado: Buscando h2o.obj...
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker type="pattern" url="pattern-h2o.patt" id="marker">
        
        <a-box id="debug-cube" position="0 0 0" scale="0.1 0.1 0.1" material="color: red;"></a-box>

        <a-entity 
          id="mol-entidad"
          obj-model="obj: url(h2o.obj);" 
          scale="1 1 1"
          position="0 0 0"
          material="color: #4CC3D9; shader: flat;">
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const mol = document.getElementById('mol-entidad');
      const status = document.getElementById('status');

      // Escuchamos si el modelo carga o falla
      mol.addEventListener('model-loaded', () => {
        status.innerHTML = "✅ ¡Molécula cargada con éxito!";
        status.style.color = "green";
      });

      mol.addEventListener('model-error', (e) => {
        status.innerHTML = "❌ Error: No se pudo leer h2o.obj";
        status.style.color = "red";
        console.error("Detalle del error:", e);
      });
    </script>
  </body>
</html>
