<!DOCTYPE html>
<html>
  <head>
    <title>AR.Chem - VSEPR Pro 7</title>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #ui-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; display: none; text-align: center; width: 280px; }
      #info-panel { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; font-family: sans-serif; border: 2px solid #2196F3; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
      #reveal-btn { background: #2196F3; color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; }
      .mol-title { color: #1976D2; font-weight: bold; font-size: 1.2em; }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <div id="ui-container">
      <div id="info-panel">
        <div id="mol-name" class="mol-title"></div>
        <div id="mol-details"></div>
      </div>
      <button id="reveal-btn">🔍 VER INFORMACIÓN</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="1 2 1"></a-entity>

    <a-marker type="pattern" url="pattern-h2o.patt" id="marker-h2o">
      <a-entity position="0 0.5 0" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        <a-sphere color="red" radius="0.4"></a-sphere>
        <a-sphere position="0.7 0.5 0" radius="0.2"></a-sphere>
        <a-sphere position="-0.7 0.5 0" radius="0.2"></a-sphere>
    
        <a-cylinder position="0.35 0.25 0" rotation="0 0 -55" radius="0.05" height="0.86" color="#999"></a-cylinder>
        <a-cylinder position="-0.35 0.25 0" rotation="0 0 55" radius="0.05" height="0.86" color="#999"></a-cylinder>
      </a-entity>
    </a-marker>

    <a-marker type="pattern" url="pattern-ch4.patt" id="marker-ch4">
      <a-entity position="0 0.5 0" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        <a-sphere color="#333" radius="0.4"></a-sphere>
      
        <a-sphere position="0 1 0" radius="0.2"></a-sphere>
        <a-sphere position="0.943 -0.333 0" radius="0.2"></a-sphere>
        <a-sphere position="-0.471 -0.333 0.816" radius="0.2"></a-sphere>
        <a-sphere position="-0.471 -0.333 -0.816" radius="0.2"></a-sphere>
      
        <a-cylinder position="0 0.5 0" radius="0.05" height="1" color="#999"></a-cylinder>
      
        <a-cylinder position="0.471 -0.166 0" rotation="0 0 -109.47" radius="0.05" height="1" color="#999"></a-cylinder>
      
        <a-cylinder position="-0.235 -0.166 0.408" rotation="0 240 70.53" radius="0.05" height="1" color="#999"></a-cylinder>
      
        <a-cylinder position="-0.235 -0.166 -0.408" rotation="0 120 70.53" radius="0.05" height="1" color="#999"></a-cylinder>
      </a-entity>
    </a-marker>

    <a-marker type="pattern" url="pattern-nh3.patt" id="marker-nh3">
      <a-entity position="0 0.5 0" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        <a-sphere color="blue" radius="0.4"></a-sphere>
    
        <a-sphere position="0.8 -0.3 0" radius="0.2"></a-sphere>
        <a-sphere position="-0.4 -0.3 0.7" radius="0.2"></a-sphere>
        <a-sphere position="-0.4 -0.3 -0.7" radius="0.2"></a-sphere>
    
    		<a-cylinder position="0.4 -0.15 0" rotation="0 0 70" radius="0.05" height="0.86" color="#999"></a-cylinder>
    		<a-cylinder position="-0.2 -0.15 0.35" rotation="0 240 70" radius="0.05" height="0.86" color="#999"></a-cylinder>
    		<a-cylinder position="-0.2 -0.15 -0.35" rotation="0 120 70" radius="0.05" height="0.86" color="#999"></a-cylinder>
      </a-entity>
    </a-marker>

    <a-marker type="pattern" url="pattern-bf3.patt" id="marker-bf3">
      <a-entity position="0 0.5 0" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        <a-sphere color="orange" radius="0.35"></a-sphere>
    
        <a-sphere position="0 1 0" radius="0.25" color="green"></a-sphere>
        <a-sphere position="0.86 -0.5 0" radius="0.25" color="green"></a-sphere>
        <a-sphere position="-0.86 -0.5 0" radius="0.25" color="green"></a-sphere>
    
        <a-cylinder position="0 0.5 0" radius="0.05" height="1" color="#999"></a-cylinder>
        <a-cylinder position="0.43 -0.25 0" rotation="0 0 60" radius="0.05" height="1" color="#999"></a-cylinder>
        <a-cylinder position="-0.43 -0.25 0" rotation="0 0 -60" radius="0.05" height="1" color="#999"></a-cylinder>
      </a-entity>
    </a-marker>

      <a-marker type="pattern" url="pattern-pf5.patt" id="marker-pf5">
        <a-entity position="0 0.5 0" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
          <a-sphere color="#FF9800" radius="0.35"></a-sphere>
          <a-sphere position="0 1.2 0" radius="0.25" color="green"></a-sphere>
          <a-sphere position="0 -1.2 0" radius="0.25" color="green"></a-sphere>
          <a-cylinder position="0 0 0" radius="0.05" height="2.4" color="#999"></a-cylinder>
          <a-sphere position="1.1 0 0" radius="0.25" color="green"></a-sphere>
          <a-sphere position="-0.55 0 0.95" radius="0.25" color="green"></a-sphere>
          <a-sphere position="-0.55 0 -0.95" radius="0.25" color="green"></a-sphere>
          <a-cylinder position="0.55 0 0" rotation="0 0 90" radius="0.05" height="1.1" color="#999"></a-cylinder>
          <a-cylinder position="-0.27 0 0.47" rotation="0 240 90" radius="0.05" height="1.1" color="#999"></a-cylinder>
          <a-cylinder position="-0.27 0 -0.47" rotation="0 120 90" radius="0.05" height="1.1" color="#999"></a-cylinder>
        </a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-sf6.patt" id="marker-sf6">
        <a-entity position="0 0.5 0" scale="0.35 0.35 0.35" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
          <a-sphere color="yellow" radius="0.4"></a-sphere>
          <a-sphere position="0 1.2 0" radius="0.25" color="green"></a-sphere>
          <a-sphere position="0 -1.2 0" radius="0.25" color="green"></a-sphere>
          <a-cylinder position="0 0 0" radius="0.05" height="2.4" color="#999"></a-cylinder>
          <a-sphere position="1.2 0 0" radius="0.25" color="green"></a-sphere>
          <a-sphere position="-1.2 0 0" radius="0.25" color="green"></a-sphere>
          <a-cylinder position="0 0 0" rotation="0 0 90" radius="0.05" height="2.4" color="#999"></a-cylinder>
          <a-sphere position="0 0 1.2" radius="0.25" color="green"></a-sphere>
          <a-sphere position="0 0 -1.2" radius="0.25" color="green"></a-sphere>
          <a-cylinder position="0 0 0" rotation="90 0 0" radius="0.05" height="2.4" color="#999"></a-cylinder>
        </a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-xef4.patt" id="marker-xef4">
        <a-entity position="0 0.5 0" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
          <a-sphere color="purple" radius="0.4"></a-sphere>
          <a-sphere position="1.1 0 0" radius="0.25" color="green"></a-sphere>
          <a-sphere position="-1.1 0 0" radius="0.25" color="green"></a-sphere>
          <a-sphere position="0 0 1.1" radius="0.25" color="green"></a-sphere>
          <a-sphere position="0 0 -1.1" radius="0.25" color="green"></a-sphere>
          <a-cylinder position="0 0 0" rotation="0 0 90" radius="0.05" height="2.2" color="#999"></a-cylinder>
          <a-cylinder position="0 0 0" rotation="90 0 0" radius="0.05" height="2.2" color="#999"></a-cylinder>
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const data = {
        'marker-h2o': { n: 'Agua (H₂O)', d: 'Geometría: <b>Angular</b><br>Hibridación: <b>sp³</b>' },
        'marker-ch4': { n: 'Metano (CH₄)', d: 'Geometría: <b>Tetraédrica</b><br>Hibridación: <b>sp³</b>' },
        'marker-nh3': { n: 'Amoníaco (NH₃)', d: 'Geometría: <b>Piramidal Trigonal</b><br>Hibridación: <b>sp³</b>' },
        'marker-bf3': { n: 'Trifluoruro de Boro (BF₃)', d: 'Geometría: <b>Trigonal Plana</b><br>Hibridación: <b>sp²</b>' },
        'marker-pf5': { n: 'Pentafluoruro (PF₅)', d: 'Geometría: <b>Bipirámide Trigonal</b><br>Hibridación: <b>sp³d</b>' },
        'marker-sf6': { n: 'Hexafluoruro (SF₆)', d: 'Geometría: <b>Octaédrica</b><br>Hibridación: <b>sp³d²</b>' },
        'marker-xef4': { n: 'XeF₄', d: 'Geometría: <b>Cuadrada Plana</b><br>Hibridación: <b>sp³d²</b>' }
      };

      const ui = document.getElementById('ui-container');
      const panel = document.getElementById('info-panel');
      const mName = document.getElementById('mol-name');
      const mDetails = document.getElementById('mol-details');
      const btn = document.getElementById('reveal-btn');

      document.querySelectorAll('a-marker').forEach(m => {
        m.addEventListener('markerFound', () => {
          mName.innerText = data[m.id].n;
          mDetails.innerHTML = data[m.id].d;
          ui.style.display = 'block';
          panel.style.display = 'none';
        });
        m.addEventListener('markerLost', () => { ui.style.display = 'none'; });
      });

      btn.addEventListener('click', () => {
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      });
    </script>
  </body>
</html>
