<!DOCTYPE html>
<html>
  <head>
    <title>AR.Chem - Modelo Completo</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #ui-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; z-index: 1000; display: none; text-align: center; }
      #info-panel { background: rgba(255,255,255,0.9); padding: 15px; border-radius: 10px; font-family: sans-serif; border: 2px solid #2196F3; }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <div id="ui-container">
      <div id="info-panel">
        <span style="font-weight:bold; color:#1976D2; font-size:1.2em;">Agua (H₂O)</span>
        <div id="mol-details">Visualizando modelo OBJ + MTL</div>
      </div>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-entity light="type: ambient; intensity: 1;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="1 2 1"></a-entity>

      <a-marker type="pattern" url="pattern-h2o.patt" id="h2o">
        <a-entity 
          obj-model="obj: url(h2o.obj); mtl: url(h2o.mtl)" 
          scale="0.1 0.1 0.1" 
          rotation="-90 0 0">
        </a-entity>
        
        <a-box position="0 0 0" scale="0.05 0.05 0.05" material="color: blue; opacity: 0.5"></a-box>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const marker = document.querySelector('a-marker');
      marker.addEventListener('markerFound', () => {
        document.getElementById('ui-container').style.display = 'block';
      });
      marker.addEventListener('markerLost', () => {
        document.getElementById('ui-container').style.display = 'none';
      });
    </script>
  </body>
</html>
